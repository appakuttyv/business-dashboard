name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: frontend

      - name: Build Project
        run: npx ng build --configuration production --base-href "/business-dashboard/" --deploy-url "/business-dashboard/"
        working-directory: frontend

      - name: Routing Fix (index.html to 404.html)
        run: cp dist/business-dashboard/browser/index.html dist/business-dashboard/browser/404.html
        working-directory: frontend

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: frontend/dist/business-dashboard/browser
          publish_branch: gh-pages
